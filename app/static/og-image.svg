<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="EnsureCollege — your whole college plan, in one place">
  <defs>
    <linearGradient id="mk" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6366f1"/><stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <radialGradient id="gA" cx="0.15" cy="0" r="0.75">
      <stop stop-color="#4f46e5" stop-opacity="0.12"/><stop offset="1" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gB" cx="1" cy="1" r="0.65">
      <stop stop-color="#f59e0b" stop-opacity="0.12"/><stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#34d399"/><stop offset="1" stop-color="#4f46e5"/>
