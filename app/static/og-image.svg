    <text x="79" y="49" font-family="Inter,system-ui,Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="0.12em" fill="#5a6b85">SCHOLARSHIPS &#183; PROGRAMS &#183; COMPETITIONS &#183; PLANNING</text>
  </g>

  <text transform="translate(76,244)" font-family="'Plus Jakarta Sans',system-ui,Arial,sans-serif" font-size="54" font-weight="800" letter-spacing="-0.02em" fill="#0e1726">
