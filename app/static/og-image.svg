<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="EnsureCollege — your whole college plan, in one place">
  <!-- "The Highlighter" social card. Editable source; the shipped og-image.png
       is rasterized from docs/brand/og-card.html (same design) with headless
       Chrome so the webfonts (Fraunces / Hanken Grotesk / Space Mono) render. -->
  <rect width="1200" height="630" fill="#eae8e1"/>
  <rect x="24" y="24" width="1152" height="582" rx="28" fill="#fbfaf7" stroke="#ddd9cd" stroke-width="2"/>

  <g transform="translate(86,76)">
    <rect width="64" height="64" rx="16" fill="#1b2430"/>
    <text x="32" y="44" text-anchor="middle" font-family="'Fraunces', Georgia, serif" font-size="38" font-weight="600" fill="#fbfaf7">E</text>
    <rect x="11" y="50" width="42" height="4.5" rx="2.25" fill="#e8a200"/>
    <text x="82" y="30" font-family="'Fraunces', Georgia, serif" font-size="34" font-weight="700" letter-spacing="-0.02em" fill="#17181c">EnsureCollege</text>
    <text x="83" y="58" font-family="'Space Mono', monospace" font-size="15" font-weight="700" letter-spacing="0.14em" fill="#5c6069">SCHOLARSHIPS &#183; PROGRAMS &#183; COMPETITIONS &#183; PLANNING</text>
  </g>

  <rect x="80" y="329" width="410" height="76" fill="rgba(240,182,22,0.45)"/>
  <text transform="translate(86,290)" font-family="'Fraunces', Georgia, serif" font-size="84" font-weight="600" letter-spacing="-0.025em" fill="#17181c">
    <tspan x="0" y="0">Your whole college plan,</tspan>
    <tspan x="0" y="90">in one place.</tspan>
  </text>

  <text transform="translate(86,462)" font-family="'Hanken Grotesk', system-ui, Arial, sans-serif" font-size="29" font-weight="500" fill="#33373f">
    <tspan x="0" y="0">Scholarships, summer programs, and competitions &#8212; matched to</tspan>
    <tspan x="0" y="42">you, with verified deadlines and a clear application plan.</tspan>
  </text>

  <g transform="translate(86,548)">
    <rect width="42" height="4" rx="2" fill="#e8a200"/>
    <text x="56" y="6" font-family="'Space Mono', monospace" font-size="16" font-weight="700" letter-spacing="0.1em" fill="#83858c">ENSURECOLLEGE.COM</text>
  </g>
</svg>
