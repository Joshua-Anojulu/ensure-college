<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body { background: #eae8e1; font-family: "Hanken Grotesk", system-ui, sans-serif; }
  .card {
    position: absolute;
    inset: 24px;
    background: #fbfaf7;
    border: 2px solid #ddd9cd;
    border-radius: 28px;
    padding: 52px 62px;
  }
  .brand-row { display: flex; align-items: center; gap: 18px; }
  .mark {
    position: relative;
    display: grid;
    place-items: center;
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: #1b2430;
    color: #fbfaf7;
    font-family: "Fraunces", Georgia, serif;
    font-size: 36px;
    font-weight: 600;
    line-height: 1;
  }
  .mark::before {
    content: "";
    position: absolute;
    left: 11px;
    right: 11px;
    bottom: 10px;
    height: 4.5px;
    border-radius: 999px;
    background: #e8a200;
  }
  .brand-name {
    font-family: "Fraunces", Georgia, serif;
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #17181c;
  }
  .eyebrow {
    margin-top: 7px;
    font-family: "Space Mono", monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: #5c6069;
  }
  h1 {
    margin-top: 74px;
    font-family: "Fraunces", Georgia, serif;
    font-size: 84px;
    font-weight: 600;
    letter-spacing: -0.025em;
    line-height: 1.06;
    color: #17181c;
  }
  .marker {
    background: linear-gradient(transparent 8%, rgba(240, 182, 22, 0.45) 8%, rgba(240, 182, 22, 0.45) 96%, transparent 96%);
    padding: 0 6px;
    margin: 0 -6px;
  }
  .sub {
    margin-top: 34px;
    max-width: 900px;
    font-size: 29px;
    font-weight: 500;
    line-height: 1.45;
    color: #33373f;
  }
  .rule {
    position: absolute;
    left: 62px;
    bottom: 52px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: "Space Mono", monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #83858c;
  }
  .rule::before {
    content: "";
    width: 42px;
    height: 4px;
    border-radius: 999px;
    background: #e8a200;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="brand-row">
      <div class="mark">E</div>
      <div>
        <div class="brand-name">EnsureCollege</div>
        <div class="eyebrow">SCHOLARSHIPS &middot; PROGRAMS &middot; COMPETITIONS &middot; PLANNING</div>
      </div>
    </div>
    <h1>Your whole college plan,<br><span class="marker">in one place.</span></h1>
    <p class="sub">Scholarships, summer programs, and competitions &mdash; matched to you, with verified deadlines and a clear application plan.</p>
    <div class="rule">ENSURECOLLEGE.COM</div>
  </div>
</body>
</html>
